name: Build & Push Docker Images

on:
  push:
    branches:
      - master
      - canary
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant:
          - name: full
            dockerfile: Dockerfile
          - name: slim
            dockerfile: Dockerfile.slim
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          VARIANT="${{ matrix.variant.name }}"

          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${IMAGE_NAME}:${VARIANT}-${VERSION}"
          elif [ "${{ github.ref_name }}" = "canary" ]; then
            TAGS="${IMAGE_NAME}:${VARIANT}-canary"
          else
            TAGS="${IMAGE_NAME}:${VARIANT}-latest,${IMAGE_NAME}:${VARIANT}-${GITHUB_SHA::7}"
          fi

          if [ "$VARIANT" = "full" ]; then
            if [ "${{ github.event_name }}" = "release" ]; then
              TAGS="${TAGS},${IMAGE_NAME}:${VERSION}"
            elif [ "${{ github.ref_name }}" = "canary" ]; then
              TAGS="${TAGS},${IMAGE_NAME}:canary"
            else
              TAGS="${TAGS},${IMAGE_NAME}:latest,${IMAGE_NAME}:main"
            fi
          fi

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          push: true
          platforms: linux/amd64
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.name }}
